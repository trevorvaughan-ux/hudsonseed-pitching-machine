# HudsonSeed Cron - FREE TIER OPTIMIZED
# Runs Tue/Wed/Thu 10am ET (14:00 UTC), exits immediately after.
# Estimated: ~1 min execution x 3 days/week = 12 min/month
# Free tier: $5 credit, 500 hours - we use < 1 hour

[build]
builder = "NIXPACKS"

[deploy]
# No startCommand here - cron will trigger the script
restartPolicyType = "NEVER"
sleepApplication = true

[[deploy.cron]]
schedule = "0 14 * * 2,3,4"
command = "python daily_outreach.py"
